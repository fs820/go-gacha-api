<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ガチャシミュレーター</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>ガチャシミュレーター</h1>
    
    <div id="pity-info">
        所持石: <span id="stone-count" style="color: blue; font-weight: bold;">---</span> 個 <br>
        星5天井まであと: <span id="pity5-count">90</span>回 / 
        星4確定まであと: <span id="pity4-count">10</span>回
    </div>

    <button id="gacha-btn" onclick="drawGacha()">単発</button>
    <button id="gacha-btn" onclick="drawGacha10()" style="background-color: #e91e63;">10連</button>

    <button id="gacha-btn" onclick="addStones()">石を追加</button>

    <div id="result-area">結果はここに表示されます</div>

    <hr>
    <h3>ガチャ履歴（直近50件）</h3>
    <div id="history-area"></div>

    <script src="script.js"></script>
    
</body>
</html>
